<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      /* Brutalism — hard edges, raw type, no shadows. */
      @import url('https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap');
      :root {
        --bg: #FFFFFF; --fg: #111827; --muted: #6B7280;
        --primary: #DD614C; --primary-fg: #FFFFFF; --success: #16A34A;
        --border: #111827;
        --mono: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
        --sans: "Darker Grotesque", ui-sans-serif, sans-serif;
      }
      [data-theme="dark"] {
        --bg: #1A1A1A; --fg: #E5E5E5; --muted: #9CA3AF;
        --primary: #FF725E; --primary-fg: #111827;
        --success: #4ADE80;
        --border: #E5E5E5;
      }
      * { box-sizing: border-box; }
      body { max-width: 520px; margin: 0 auto; font: 18px/1.4 var(--sans); font-weight: 500; color: var(--fg); background: var(--bg); padding: 40px 24px; border: 4px solid var(--border); }
      h1 { font: 900 2rem/1 var(--sans); letter-spacing: -1px; }
      label { display: block; margin: 24px 0 8px; font: 700 14px var(--mono); text-transform: uppercase; letter-spacing: 1px; }
      label:first-of-type { margin-top: 0; }
      input, select { width: 100%; font: 400 15px var(--mono); padding: 14px 16px; border: 3px solid var(--border); background: var(--bg); color: var(--fg); margin-bottom: 4px; }
      textarea { width: 100%; font: 400 14px var(--mono); padding: 12px 16px; border: 3px solid var(--border); background: var(--bg); color: var(--fg); }
      textarea:focus { outline: none; border-color: var(--primary); }
      input:focus, select:focus { outline: none; border-color: var(--primary); }
      input:disabled { color: var(--muted); border-style: dashed; }
      .hint { color: var(--muted); font: 400 14px var(--sans); margin-top: 6px; }
      button { font: 700 14px var(--mono); padding: 14px 24px; border: 3px solid var(--border); cursor: pointer; background: var(--bg); color: var(--fg); transition: transform .05s; text-transform: uppercase; letter-spacing: 1px; }
      .btn-row { display: flex; gap: 12px; margin-top: 16px; }
      button:hover { transform: translate(-2px, -2px); box-shadow: 4px 4px 0 var(--border); }
      button:active { transform: translate(2px, 2px); box-shadow: none; }
      .saved { color: var(--success); margin-left: 12px; font: 700 14px var(--mono); }
      .row { display: flex; gap: 10px; align-items: center; }
      .icon-btn { margin-top: 0; padding: 11px 13px; color: var(--fg); flex-shrink: 0; }
      .head { display: flex; align-items: center; justify-content: space-between; border-bottom: 4px solid var(--border); padding-bottom: 12px; }
      #themeToggle { padding: 10px 12px; font-size: 18px; border: 3px solid var(--border); }
      [hidden] { display: none !important; }
    </style>
  </head>
  <body>
    <div class="head">
      <h1>Clean Bookmarks — Settings</h1>
      <button id="themeToggle" type="button" title="Toggle light/dark">🌙</button>
    </div>
    <p class="hint">
      Bring your own key. Your bookmark titles and URLs are sent only to the endpoint
      below. The key is stored locally in your browser and never synced.
    </p>

    <label for="provider">Provider</label>
    <select id="provider"></select>

    <label for="baseUrl">API base URL</label>
    <div class="row">
      <input id="baseUrl" placeholder="https://api.openai.com/v1" disabled />
      <button id="editBaseUrl" class="icon-btn" type="button" title="Edit base URL">✏️</button>
    </div>
    <div class="hint">Auto-filled by provider. Click the pencil to edit for a region variant or custom endpoint.</div>

    <label for="apiKey">API key</label>
    <input id="apiKey" type="password" placeholder="sk-…" />

    <label for="model">Model</label>
    <select id="modelSelect"></select>
    <input id="modelCustom" placeholder="model name" hidden />

    <label for="prompt">Taxonomy prompt <span class="hint" style="display:inline">(customize how AI proposes categories)</span></label>
    <textarea id="prompt" rows="4" style="resize:vertical;min-height:64px"></textarea>

    <div class="btn-row">
      <button id="backBtn">Back</button>
      <button id="save">Save</button>
    </div>
    <span class="saved" id="saved" hidden>Saved ✓</span>
    <script type="module" src="./options.js"></script>
  </body>
</html>
